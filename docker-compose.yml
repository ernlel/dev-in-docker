# ──────────────────────────────────────────────────────────────────────
#  Dev Environment — code-server + opencode + mise + docker-from-host
# ──────────────────────────────────────────────────────────────────────
#  Usage:
#    docker compose up -d
#    # code-server: http://localhost:8443   password: see .env
#    # opencode:    http://localhost:3000   password: see .env
#
#  Rebuild after Dockerfile or version changes:
#    docker compose build --no-cache
# ──────────────────────────────────────────────────────────────────────

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NIX_VERSION: "${NIX_VERSION:-latest}"
        CODE_SERVER_VERSION: "${CODE_SERVER_VERSION:-latest}"
        OPENCODE_VERSION: "${OPENCODE_VERSION:-latest}"
    container_name: dev
    hostname: dev
    restart: unless-stopped

    cap_drop:
      - NET_RAW
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_PTRACE

    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID

    # ── Persist host home + Nix store ──
    volumes:
      # :z relabels the mount for container access (required on SELinux-
      # enforcing hosts like Fedora). Remove :z if you're on macOS.
      - "${HOME_MOUNT:-~}:/home/dev:consistent,z"
      - /var/run/docker.sock:/var/run/docker.sock
      - ./post-install.sh:/app/post-install.sh:ro
      # Nix store under home mount (persists packages across rebuilds):
      - "${HOME_MOUNT:-~}/.nix:/nix:Z"
      # Uncomment to mount a host directory at /workspace:
      # - "${WORKSPACE_MOUNT:-}:/workspace:consistent,z"

    # ── Ports ──
    ports:
      - "${CODE_SERVER_PORT:-8443}:8443"
      - "${OPENCODE_PORT:-3000}:3000"

    # ── Environment ──
    environment:
      # code-server
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-devpass}"

      # opencode web server
      OPENCODE_PORT: "${OPENCODE_PORT:-3000}"
      OPENCODE_PASSWORD: "${OPENCODE_PASSWORD:-}"

      # Home directory inside the container (must match /home/dev in entrypoint)
      DEV_HOME: /home/dev

      # Pre-install mise-managed tools on first run
      MISE_DEFAULT_TOOLS: "${MISE_DEFAULT_TOOLS:-nodejs@latest python@latest rust@latest go@latest}"

      # UID/GID fallback
      DEV_UID: "${DEV_UID:-1000}"
      DEV_GID: "${DEV_GID:-1000}"

    # ── Default: code-server ──
    command: ["code-server", "--disable-telemetry"]

    # ── Health check ──
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8443/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
