# ──────────────────────────────────────────────────────────────────────
#  Dev Environment — code-server + AionUI Web + mise + docker-from-host
# ──────────────────────────────────────────────────────────────────────
#  Usage:
#    docker compose up -d
#    # code-server: http://localhost:8443   password: devpass
#    # AionUI:      http://localhost:3000
#
#  Rebuild after Dockerfile changes:
#    docker compose build --no-cache
# ──────────────────────────────────────────────────────────────────────

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "${NODE_VERSION:-20}"
        AIONUI_REPO: "${AIONUI_REPO:-https://github.com/iOfficeAI/AionUi.git}"
        AIONUI_TAG: "${AIONUI_TAG:-v2.1.9}"
        AIONCORE_VERSION: "${AIONCORE_VERSION:-v0.1.29}"
        CODE_SERVER_VERSION: "${CODE_SERVER_VERSION:-4.96.4}"
    container_name: dev
    hostname: dev
    restart: unless-stopped

    cap_drop:
      - NET_RAW
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_PTRACE

    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID

    # ── Persist host home (dotfiles, SSH keys, projects, mise data, …) ──
    volumes:
      # :z relabels the mount for container access (required on SELinux-
      # enforcing hosts like Fedora). Remove :z if you're on macOS.
      - "${HOST_HOME:-~}:${CONTAINER_HOME:-/home/dev}:consistent,z"
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Ports ──
    ports:
      - "${CODE_SERVER_PORT:-8443}:8443"
      - "${AIONUI_PORT:-3000}:3000"

    # ── Environment ──
    environment:
      # code-server password (change this!)
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-devpass}"

      # AionUI Web
      AIONUI_ENABLED: "${AIONUI_ENABLED:-true}"
      AIONUI_PORT: 3000
      AIONUI_PASSWORD: "${AIONUI_PASSWORD:-}"

      # Home directory inside the container
      DEV_HOME: "${CONTAINER_HOME:-/home/dev}"

      # Pre-install mise-managed tools on first run
      MISE_DEFAULT_TOOLS: "${MISE_DEFAULT_TOOLS:-nodejs@22}"

      # AionUI CLI agents to install (comma-separated: opencode,gemini,claude)
      AIONUI_CLI_AGENTS: "${AIONUI_CLI_AGENTS:-}"

      # UID/GID fallback
      DEV_UID: "${DEV_UID:-1000}"
      DEV_GID: "${DEV_GID:-1000}"

    # ── Default: code-server + AionUI ──
    command: ["code-server", "--disable-telemetry"]

    # ── Health check ──
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8443/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
